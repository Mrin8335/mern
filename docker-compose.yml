version: '3.8'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb+srv://mrinmoybhuiya88_db_user:Windows10@webpage.uklqhey.mongodb.net/?appName=webpage
      - PORT=5000
    

  frontend:
    build: ./frontend
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

  mongodb:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db

volumes:
  mongodb-data:
